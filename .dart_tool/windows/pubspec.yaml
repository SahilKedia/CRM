name: crm_auth
description: CRM Pro - Authentication screens for Flutter CRM app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.2.2

  # File handling
  image_picker: ^1.1.2
  # excel: ^4.0.6
  excel_plus: ^1.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.1
  file_picker: ^8.0.0+1
  dio: ^5.4.0
  intl: ^0.19.0
  country_code_picker: ^3.0.0
  country_state_city: ^0.1.6


  # Secure Storage
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^17.2.3 
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

# This must be OUTSIDE the flutter: section
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg
    - assets/icon.jpg